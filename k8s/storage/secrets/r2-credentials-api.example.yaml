# Copy this file to r2-credentials-api.yaml (gitignored — see **/secrets/*.yaml in .gitignore)
# and replace both values before applying. Never commit the real file.
#
# These are Api's R2 credentials — minted from a token scoped to the
# image-pipeline bucket only (ADR-022/025). Note: despite Api only ever
# calling GetPresignedUploadUrl/GetPresignedDownloadUrl, this token still
# carries full Object Read & Write permission — R2 (like S3) checks the
# signing credential's actual permissions when a presigned URL is used, not
# at mint time, so there is no narrower "mint-only" permission tier to scope
# this token down to. The Api/Worker boundary here is enforced at the
# application/interface level (IPresignedUrlProvider vs. IObjectStorage), not
# by a difference in the underlying R2 permission grant.
apiVersion: v1
kind: Secret
metadata:
  name: r2-credentials-api
  namespace: image-pipeline
type: Opaque
stringData:
  accessKeyId: CHANGE_ME
  secretAccessKey: CHANGE_ME
