# Copy this file to r2-credentials-worker.yaml (gitignored — see **/secrets/*.yaml in .gitignore)
# and replace both values before applying. Never commit the real file.
#
# Worker's R2 credentials — a separate token from Api's, scoped to the same
# image-pipeline bucket (ADR-022/025). Kept as its own token (rather than
# sharing Api's) for independent rotation/revocation, even though both
# tokens currently hold the same Object Read & Write permission level — see
# r2-credentials-api.example.yaml for why R2 has no narrower tier to split
# them on.
apiVersion: v1
kind: Secret
metadata:
  name: r2-credentials-worker
  namespace: image-pipeline
type: Opaque
stringData:
  accessKeyId: CHANGE_ME
  secretAccessKey: CHANGE_ME
